CONFIG_GPIO=y

# Console output - printf goes through ram_console to trace0
CONFIG_CONSOLE=y
CONFIG_RAM_CONSOLE=y
CONFIG_RAM_CONSOLE_BUFFER_SIZE=1024
CONFIG_UART_CONSOLE=n

# Enable printf/stdout
CONFIG_STDOUT_CONSOLE=y
CONFIG_PRINTK=y

# Disable Zephyr logging - use printf for trace0 output instead
CONFIG_LOG=n

# OpenAMP resource table - includes trace entry when RAM_CONSOLE is enabled
CONFIG_OPENAMP=y
CONFIG_OPENAMP_RSC_TABLE=y
CONFIG_OPENAMP_RSC_TABLE_NUM_RPMSG_BUFF=0
